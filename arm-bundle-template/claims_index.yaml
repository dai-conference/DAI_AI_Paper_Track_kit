# Replace this template claim with the paper's headline scientific claims.
# For R0/R1 and executable R2 bundles, prefer machine_check entries that point to
# files generated by the entry point. For R3 bundles, use machine_check only when
# an inspection script truly writes machine-readable pass/fail evidence.
claims:
  - claim_id: C1
    claim_text: "The template verification script confirms that the provided headline result is internally consistent."
    paper_location: "Section 1, Example Claim"
    claim_type: reproducibility_check
    support:
      execution_artifacts:
        - "execution/src/verify_headline_result.py"
        - "execution/expected_outputs/headline_result.json"
      trace_steps:
        - "T003"
      knowledge_graph_nodes:
        - "claim:C1"
    verification:
      command: "bash execution/run.sh"
      expected_result: "PASS: headline result matches expected output."
      machine_check:
        path: "execution/generated_outputs/claim_checks.json"
        json_pointer: "/claims/0/passed"
        expected: true
    limitations: "This is a template claim, not a real scientific claim."
